services:
  docman-fake:
    build: .
    ports:
      - "8089:8089"
    environment:
      - REQUIRE_AUTH=false
      - TOKEN_EXPIRY_SECONDS=3600
      - FAIL_RATE=0.0
      - SLOW_RESPONSE_MS=0
      - MAX_FILE_SIZE_MB=10
      - SIMULATE_DC02=false

